<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyadh Bank IVR Annotation Platform</title>
<script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.prod.js"></script>

<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--cyan:#58a6ff;--green:#3fb950;--blue:#388bfd;--orange:#d29922;--red:#f85149;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--cyan);color:#000}.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:3px 8px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-hp{background:#1a3a1a;color:var(--green)}.badge-ms{background:#1a2a3a;color:var(--blue)}
.badge-am{background:#2a2a1a;color:var(--orange)}.badge-nf{background:#2a1a2a;color:var(--purple)}
.badge-nc{background:#1a2a2a;color:#56d4dd}.badge-ap{background:#2a1a1a;color:var(--red)}
.action-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace}
.action-tool{background:#0d2818;color:var(--green);border:1px solid #1a3a1a}
.action-text{background:#0d1a2a;color:var(--blue);border:1px solid #1a2a3a}
.action-dtmf{background:#1a1a0d;color:var(--orange);border:1px solid #2a2a1a}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:800px;width:90%;max-height:85vh;overflow-y:auto}
.toast{position:fixed;top:16px;right:16px;z-index:200;padding:10px 18px;border-radius:8px;font-size:13px;animation:slideIn .3s}
.toast-ok{background:#0d2818;color:var(--green);border:1px solid #1a3a1a}
.toast-err{background:#2a0d0d;color:var(--red);border:1px solid #2a1a1a}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.bubble{max-width:85%;padding:10px 14px;border-radius:12px;margin:6px 0;position:relative}
.bubble-user{background:#1a2233;border:1px solid #253040;margin-right:auto;border-bottom-left-radius:4px}
.bubble-agent{background:#1a1a2a;border:1px solid #252540;margin-left:auto;border-bottom-right-radius:4px}
.bubble .original{font-size:14px;line-height:1.5;min-height:20px}
.bubble .original[dir="rtl"]{text-align:right;font-family:'Noto Sans Arabic','Noto Sans SC',sans-serif}
.bubble .en-trans{font-size:12px;color:var(--text2);margin-top:4px;padding-top:4px;border-top:1px dashed var(--border);min-height:16px}
.editable{outline:none;cursor:text;border-radius:4px;padding:2px 4px;transition:background .15s}
.editable:hover{background:rgba(88,166,255,.08)}.editable:focus{background:rgba(88,166,255,.12)}
.search-wrap{position:relative}.search-drop{position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;z-index:50;margin-top:2px}
.search-drop-item{padding:6px 10px;font-size:13px;cursor:pointer}.search-drop-item:hover{background:rgba(88,166,255,.12)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
<div v-if="!isAuthenticated" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg)">
  <div style="background:var(--card);padding:40px;border-radius:12px;border:1px solid var(--border);text-align:center;width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.5)">
    <h2 style="color:var(--cyan);margin-bottom:20px;font-family:'JetBrains Mono',monospace">Login Required</h2>
    <input type="password" v-model="passwordInput" @keyup.enter="login" placeholder="Enter password..." style="width:100%;margin-bottom:16px;padding:10px;font-size:14px;text-align:center">
    <button class="btn-primary" @click="login" style="width:100%;padding:10px;font-size:14px">Enter Platform</button>
    <div v-if="passwordError" style="color:var(--red);font-size:13px;margin-top:12px;font-weight:500">{{passwordError}}</div>
  </div>
</div>
<template v-else>
<!-- HEADER -->
<header style="background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0">
  <div style="font-size:16px;font-weight:700;color:var(--cyan)">🏦 Riyadh Bank IVR Annotation Platform</div>
  <div style="flex:1"></div>
  <span style="font-size:12px;color:var(--text2)">{{testCases.length}} cases</span>
  <button class="btn-ghost btn-sm" @click="showCoverage=true">📊 Coverage</button>
  <button class="btn-ghost btn-sm" @click="showSettings=true">⚙️ Settings</button>
</header>

<div style="display:flex;flex:1;overflow:hidden">
<!-- LEFT SIDEBAR -->
<div style="width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;min-height:0">
  <div style="padding:8px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0">
    <input v-model="searchQ" placeholder="🔍 Search test_id / conversation..." style="width:100%">
    <div style="display:flex;gap:4px">
      <select v-model="filterCat" style="flex:1"><option value="">All Categories</option><option v-for="c in CATEGORIES" :value="c">{{c}}</option></select>
      <select v-model="filterLang" style="width:80px"><option value="">Language</option><option value="English">EN</option><option value="Arabic">AR</option></select>
    </div>
    <div style="font-size:11px;color:var(--text2)">Showing {{filteredCases.length}} / {{testCases.length}}</div>
  </div>
  <div ref="listRef" style="flex:1;overflow-y:scroll;min-height:0">
    <div v-for="tc in filteredCases" :key="tc.test_id" :data-tid="tc.test_id" @click="selectCase(tc)"
      :style="{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',background:selected?.test_id===tc.test_id?'rgba(88,166,255,.1)':'transparent'}"
      @mouseenter="$event.target.style.background=selected?.test_id===tc.test_id?'rgba(88,166,255,.1)':'rgba(255,255,255,.03)'"
      @mouseleave="$event.target.style.background=selected?.test_id===tc.test_id?'rgba(88,166,255,.1)':'transparent'">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-family:'JetBrains Mono';font-size:12px;color:var(--cyan)">{{tc.test_id}}</span>
        <span :class="'badge badge-'+catClass(tc.category)">{{tc.category}}</span>
        <span style="font-size:13px">{{caseLanguage(tc)==='Arabic'?'🇸🇦':'🇬🇧'}}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{tc.description}}</div>
    </div>
    <div v-if="filteredCases.length===0" style="padding:24px;text-align:center;color:var(--text2)">
      <div style="font-size:32px;margin-bottom:8px">📋</div>
      <div>No test cases</div>
      <div style="font-size:12px;margin-top:4px">Click 'Import JSONL' below to load data</div>
    </div>
  </div>
</div>

<!-- MAIN PANEL -->
<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <div v-if="!selected" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2)">
    <div style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">💬</div>
      <div style="font-size:16px">Select a test case to view</div>
      <div style="font-size:13px;margin-top:4px">Or import a JSONL file to start annotating</div>
    </div>
  </div>
  <template v-if="selected">
    <!-- CASE HEADER -->
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card)">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input v-model="selected.test_id" style="width:130px;font-family:'JetBrains Mono';font-weight:600">
        <select v-model="selected.category">
          <option v-for="c in CATEGORIES" :value="c">{{c}}</option>
        </select>
        <input v-model="selected.description" style="flex:1;min-width:200px" placeholder="Description...">
        <button class="btn-primary btn-sm" @click="saveCase">💾 Save</button>
        <button class="btn-danger btn-sm" @click="deleteCase">🗑️ Delete</button>
        <button class="btn-ghost btn-sm" @click="translateAll" title="Translate all untranslated conversations">🔄 Translate All</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2)">Expected Behavior:</span>
        <select v-model="selected.expected_behavior.action" v-if="selected.expected_behavior" style="font-size:12px">
          <option value="call_tool:transfer_call">call_tool:transfer_call</option>
          <option value="reply_text">reply_text</option>
          <option value="fallback_dtmf">fallback_dtmf</option>
          <option value="reply_text:ask_clarification_or_dtmf">reply_text:ask_clarification_or_dtmf</option>
        </select>
        <template v-if="selected.expected_behavior?.action==='call_tool:transfer_call'">
          <select v-model="selectedParams.language" style="width:90px;font-size:12px">
            <option value="English">English</option><option value="Arabic">Arabic</option>
          </select>
          <div class="search-wrap" style="width:240px">
            <input v-model="branchSearch" @focus="branchDropOpen=true" @input="branchDropOpen=true"
              :placeholder="selectedParams.branch_id?branchLabel(selectedParams.branch_id):'Search branch...'" style="width:100%;font-size:12px">
            <div v-if="branchDropOpen" class="search-drop">
              <div v-for="b in filteredBranches" :key="b.code" class="search-drop-item" @mousedown.prevent="pickBranch(b.code)">
                <span style="font-family:'JetBrains Mono';color:var(--cyan)">{{b.code}}</span>
                {{b.en}} <span style="color:var(--text2)">{{b.ar}}</span>
              </div>
            </div>
          </div>
          <select v-model="selectedParams.intent_id" style="width:180px;font-size:12px">
            <option v-for="(name,id) in INTENTS" :key="id" :value="id">{{id}}: {{name}}</option>
          </select>
        </template>
        <span v-if="selected.expected_behavior?.action==='call_tool:transfer_call'" class="action-tag action-tool">
          ✅ transfer({{selectedParams.language}}, {{selectedParams.branch_id}}, {{selectedParams.intent_id}})
        </span>
        <span v-else-if="selected.expected_behavior.action?.includes('reply_text')" class="action-tag action-text">💬 reply_text</span>
        <span v-else class="action-tag action-dtmf">⌨️ fallback_dtmf</span>
      </div>
    </div>

    <!-- CONVERSATION -->
    <div style="flex:1;overflow-y:auto;padding:16px">
      <div v-for="(msg,idx) in selected.conversation" :key="idx" style="display:flex;margin-bottom:12px"
        :style="{justifyContent:msg.role==='user'?'flex-start':'flex-end'}">
        <div :class="'bubble bubble-'+(msg.role==='user'?'user':'agent')" style="position:relative">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-size:11px;font-weight:600;color:var(--text2)">{{msg.role==='user'?'👤 Customer':'🤖 Agent'}}</span>
            <div style="flex:1"></div>
            <button class="btn-ghost btn-sm" @click="translateMsg(idx)" :disabled="translating[idx]" title="Translate to translation target">
              <span v-if="translating[idx]" class="spinner"></span><span v-else>🔄 Translate</span>
            </button>
            <button v-if="getTranslation(idx)" class="btn-ghost btn-sm" @click="regenerateMsg(idx)" :disabled="regenerating[idx]" title="Regenerate original from translation">
              <span v-if="regenerating[idx]" class="spinner"></span><span v-else>🔄 Regenerate</span>
            </button>
            <button class="btn-ghost btn-sm" style="color:var(--red)" @click="removeMsg(idx)" title="Delete message">🗑️</button>
          </div>
          <div class="original editable" contenteditable="true" :dir="isArabic(msg.content)?'rtl':'ltr'"
            @blur="msg.content=$event.target.innerText" v-text="msg.content"></div>
          <div class="en-trans editable" contenteditable="true" @blur="setTranslation(idx,$event.target.innerText)"
            v-text="getTranslation(idx)||'(Click Translate to generate)'"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="btn-ghost" @click="addMsg('user')">➕ Add Customer Message</button>
        <button class="btn-ghost" style="margin-left:8px" @click="addMsg('agent')">➕ Add Agent Message</button>
      </div>
    </div>
  </template>
</div>
</div>

<!-- BOTTOM BAR -->
<div style="background:var(--card);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0">
  <button class="btn-ghost" @click="$refs.fileInput.click()">📥 Import JSONL</button>
  <input ref="fileInput" type="file" accept=".jsonl,.json" style="display:none" @change="importFile">
  <button class="btn-ghost" @click="exportJsonl">📤 Export JSONL</button>
  <button class="btn-ghost" @click="exportJson" title="Select folder to save as JSON">📤 Export JSON</button>
  <button class="btn-ghost" @click="exportMarkdown">📤 Export Markdown</button>
  <div style="flex:1"></div>
  <button class="btn-primary" @click="newCase">➕ New Case</button>
</div>

<!-- SETTINGS MODAL -->
<div v-if="showSettings" class="modal-overlay" @click.self="showSettings=false">
  <div class="modal" style="max-width:480px">
    <h3 style="margin-bottom:16px">⚙️ Settings</h3>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">API Base URL</label>
      <input v-model="settings.apiBase" style="width:100%" placeholder="/api/chat or https://integrate.api.nvidia.com/v1/chat/completions">
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Proxy: /api/chat (no CORS) | Direct: full URL (needs API Key)</div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">API Key</label>
      <input v-model="settings.apiKey" type="password" style="width:100%" placeholder="nvapi-...">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Translation Model</label>
      <input v-model="settings.model" style="width:100%" placeholder="qwen/qwen3.5-122b-a10b">
    </div>
    <div style="margin-bottom:4px;font-size:11px;color:var(--text2)">Default uses NVIDIA NIM free Qwen3.5 model</div>
    <div style="margin-bottom:16px">
      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px">Batch Translation Concurrency</label>
      <input v-model.number="settings.batchSize" type="number" style="width:80px" min="1" max="10">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-ghost" @click="showSettings=false">Cancel</button>
      <button class="btn-primary" @click="saveSettings">Save Settings</button>
    </div>
  </div>
</div>

<!-- COVERAGE MODAL -->
<div v-if="showCoverage" class="modal-overlay" @click.self="showCoverage=false">
  <div class="modal">
    <h3 style="margin-bottom:16px">📊 Coverage仪表板</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- Branch coverage -->
      <div style="grid-column:1/3">
        <h4 style="color:var(--cyan);margin-bottom:8px">🏢 Branch Coverage — {{coveredBranches.size}} / {{Object.keys(BRANCHES).length}}</h4>
        <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:8px">
          <div :style="{width:(coveredBranches.size/Object.keys(BRANCHES).length*100)+'%',height:'100%',background:coveredBranches.size/Object.keys(BRANCHES).length>.8?'var(--green)':'var(--orange)',borderRadius:'4px',transition:'width .3s'}"></div>
        </div>
        <details>
          <summary style="cursor:pointer;font-size:12px;color:var(--text2)">Uncovered branches ({{Object.keys(BRANCHES).length - coveredBranches.size}})</summary>
          <div style="max-height:150px;overflow-y:auto;margin-top:8px;font-size:12px;columns:3;column-gap:12px">
            <template v-for="(info,code) in BRANCHES" :key="code"><div v-if="!coveredBranches.has(code)" style="margin-bottom:2px">
              <span style="font-family:'JetBrains Mono';color:var(--cyan)">{{code}}</span> {{info.en||info.ar}}
            </div></template>
          </div>
        </details>
      </div>
      <!-- Category dist -->
      <div>
        <h4 style="color:var(--cyan);margin-bottom:8px">📂 Category Distribution</h4>
        <div v-for="c in CATEGORIES" :key="c" style="margin-bottom:4px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span>{{c}}</span><span>{{catCount(c)}}</span></div>
          <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:2px">
            <div :style="{width:(catCount(c)/Math.max(testCases.length,1)*100)+'%',height:'100%',background:'var(--cyan)',borderRadius:'3px'}"></div>
          </div>
        </div>
      </div>
      <!-- Intent dist -->
      <div>
        <h4 style="color:var(--cyan);margin-bottom:8px">🎯 Intent Distribution</h4>
        <div v-for="(name,id) in INTENTS" :key="id" style="margin-bottom:4px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span>{{id}}: {{name}}</span><span>{{intentCount(id)}}</span></div>
          <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:2px">
            <div :style="{width:(intentCount(id)/Math.max(testCases.length,1)*100)+'%',height:'100%',background:'var(--green)',borderRadius:'3px'}"></div>
          </div>
        </div>
      </div>
      <!-- Language -->
      <div style="grid-column:1/3">
        <h4 style="color:var(--cyan);margin-bottom:8px">🌐 Language Distribution</h4>
        <div style="display:flex;gap:24px;font-size:13px">
          <span>🇬🇧 English: {{langCount('English')}}</span>
          <span>🇸🇦 Arabic: {{langCount('Arabic')}}</span>
          <span style="color:var(--text2)">Unlabeled: {{langCount(null)}}</span>
        </div>
      </div>
    </div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn-ghost" @click="showCoverage=false">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div v-if="toast" :class="'toast toast-'+(toast.type||'ok')" @click="toast=null">{{toast.msg}}</div>
</template>
</div>

<script>

    try{
      const s = localStorage.getItem('ivr_annotation_settings');

      const d = localStorage.getItem('ivr_annotation_data');

        e.preventDefault();
        const next = Math.min(curIdx+1, list.length-1);
        selectCase(list[next]);
        scrollToItem(list[next].test_id);

        e.preventDefault();
        const prev = Math.max(curIdx-1, 0);
        selectCase(list[prev]);
        scrollToItem(list[prev].test_id);
      }

    return tc.expected_behavior?.parameters?.language || tc.context?.language || '';

    return testCases.value.filter(tc=>{
      if(filterCat.value && tc.category!==filterCat.value) return false;
      const lang = caseLanguage(tc);
      if(filterLang.value && lang!==filterLang.value) return false;
      if(searchQ.value){
        const q = searchQ.value.toLowerCase();
        const conv = tc.conversation?.map(m=>m.content).join(' ')||'';
        if(!tc.test_id.toLowerCase().includes(q) && !conv.toLowerCase().includes(q) && !(tc.description||'').toLowerCase().includes(q)) return false;
      }
      return true;
    });
  });

  const filteredBranches = computed(()=>{
    const q = branchSearch.value.toLowerCase();
    return Object.entries(BRANCHES).map(([code,info])=>({code,...info})).filter(b=>{
      if(!q) return true;
      return b.code.includes(q) || (b.en||'').toLowerCase().includes(q) || (b.ar||'').includes(branchSearch.value);
    }).slice(0,30);
  });

  const coveredBranches = computed(()=>{
    const s = new Set();
    testCases.value.forEach(tc=>{
      const bid = tc.expected_behavior?.parameters?.branch_id;
      if(bid && bid!=='0') s.add(String(bid));
    });
    return s;
  });

  function catClass(c){return{HappyPath:'hp',MissingSlots:'ms',Ambiguity:'am',NoiseFallback:'nf',NegationCorrection:'nc',AdversarialParams:'ap'}[c]||'hp'}
  function branchLabel(id){const b=BRANCHES[id];return b?`${id}: ${b.en} / ${b.ar}`:id}
  function isArabic(t){return /[\u0600-\u06ff]/.test(t)}
  function catCount(c){return testCases.value.filter(t=>t.category===c).length}
  function intentCount(id){return testCases.value.filter(t=>t.expected_behavior?.parameters?.intent_id===id).length}
  function langCount(l){
    if(l===null) return testCases.value.filter(t=>!t.expected_behavior?.parameters?.language && !t.context?.language).length;
    return testCases.value.filter(t=>(t.expected_behavior?.parameters?.language||t.context?.language)===l).length;
  }

  function selectCase(tc){selected.value=tc;branchSearch.value=''}
  function scrollToItem(tid){nextTick(()=>{
    const container=listRef.value;if(!container)return;
    const items=container.querySelectorAll('[data-tid]');
    const el=Array.from(items).find(node=>node.getAttribute('data-tid')===String(tid));
    if(!el)return;
    const ct=container.getBoundingClientRect(),et=el.getBoundingClientRect();
    if(et.top<ct.top) container.scrollTop+=et.top-ct.top-4;
    else if(et.bottom>ct.bottom) container.scrollTop+=et.bottom-ct.bottom+4;
  })}
  function pickBranch(code){selectedParams.value.branch_id=code;branchSearch.value='';branchDropOpen.value=false}

  function msgKey(tc,idx){return `${tc.test_id}__${idx}`}
  function getTranslation(idx,tc=selected.value){if(!tc)return'';return translations[msgKey(tc,idx)]||''}
  function setTranslation(idx,text,tc=selected.value){if(!tc)return;translations[msgKey(tc,idx)]=text;localStorage.setItem('ivr_translations',JSON.stringify(translations))}

  function showToast(msg,type='ok'){toast.value={msg,type};setTimeout(()=>toast.value=null,3000)}

  async function callLLM(systemPrompt, userMsg){
    if(!settings.apiKey){showToast('Please configure API Key in settings','err');return null}
    try{
      const r = await fetch(settings.apiBase,{
        method:'POST',
        headers:{'Authorization':`Bearer ${settings.apiKey}`,'Content-Type':'application/json'},
        body:JSON.stringify({model:settings.model,messages:[{role:'system',content:systemPrompt},{role:'user',content:userMsg}],max_tokens:500})
      });
      const d = await r.json();
      if(d.error){showToast(d.error.message||'API Error','err');return null}
      let text = d.choices?.[0]?.message?.content?.trim()||null;
      // Strip <think>...</think> blocks from reasoning models
      if(text) text = text.replace(/<think>[\s\S]*?<\/think>/g,'').trim();
      return text;
    }catch(e){showToast('Network error: '+e.message,'err');return null}
  }

  async function translateAll(){
    const tc = selected.value;
    if(!tc)return;
    const msgs = tc.conversation;
    const queue = [];
    for(let i=0; i<msgs.length; i++){
      if(!getTranslation(i,tc)) queue.push(i);
    }
    if(queue.length === 0){
      showToast('No untranslated text currently');
      return;
    }
    showToast(`Start translating ${queue.length} messages...`);
    let successCount = 0;
    let failCount = 0;
    for(let i=0; i<queue.length; i+=settings.batchSize||3){
      const batch = queue.slice(i, i+(settings.batchSize||3));
      const results = await Promise.all(batch.map(idx => translateMsg(idx,tc)));
      results.forEach(res => res ? successCount++ : failCount++);
      if(failCount > 0) break; // 若有哪怕一条出错（网络错误/API错误），则立刻中止后续批次
    }
    if(failCount > 0){
      showToast(`Translation partially failed: Success ${successCount} cases, failed. Please check network.`, 'err');
    } else {
      showToast(`Full translation completed! Successfully processed ${successCount} cases。`);
    }
  }

  async function translateMsg(idx,tc=selected.value){
    if(!tc || !tc.conversation?.[idx])return false;
    translating[idx]=true;
    const text = tc.conversation[idx].content;
    const result = await callLLM(
      'Translate the following text. If it is Arabic, translate to English. If it is English, translate to Chinese. Only output the translation, without any explanations or extra words.',
      text
    );
    translating[idx]=false;
    if(result) {
      setTranslation(idx,result,tc);
      return true;
    }
    return false;
  }

  async function regenerateMsg(idx,tc=selected.value){
    if(!tc || !tc.conversation?.[idx])return;
    regenerating[idx]=true;
    const zhText = getTranslation(idx,tc);
    const lang = tc.context?.language || tc.expected_behavior?.parameters?.language || 'English';
    const result = await callLLM(
      `Based on the following description, generate a natural spoken expression in ${lang==='Arabic'?'Arabic':'English'} simulating a bank customer on an IVR call. Output only the generated ${lang==='Arabic'?'Arabic':'English'} text without explanations.`,
      zhText
    );
    if(result && tc.conversation?.[idx]){
      tc.conversation[idx].content = result;
      showToast('Original text regenerated');
    }
    regenerating[idx]=false;
  }

  function addMsg(role){
    if(!selected.value)return;
    selected.value.conversation.push({role,content:''});
    nextTick(()=>{
      const bubbles=document.querySelectorAll('.bubble .original');
      if(bubbles.length) bubbles[bubbles.length-1].focus();
    });
  }
  function removeMsg(idx){
    if(!selected.value||selected.value.conversation.length<=1)return;
    selected.value.conversation.splice(idx,1);
  }

  function saveCase(){
    if(!selected.value)return;
    // Validate
    const tc = selected.value;
    if(!tc.test_id?.trim()){showToast('test_id cannot be empty','err');return}
    if(tc.conversation.length===0){showToast('Must have at least 1 message','err');return}
    const action = tc.expected_behavior?.action;
    if(action==='call_tool:transfer_call'){
      const p = tc.expected_behavior?.parameters||{};
      if(!p.language){showToast('Language is required','err');return}
      if(p.branch_id && p.branch_id!=='0' && !BRANCHES[p.branch_id]){showToast(`branch_id ${p.branch_id} not in registry`,'err');return}
      const iid = parseInt(p.intent_id);
      if(isNaN(iid)||iid<0||iid>7){showToast('intent_id must be 0-7','err');return}
    }
    // Force reactivity trigger
    localStorage.setItem('ivr_annotation_data',JSON.stringify(testCases.value));
    showToast('Saved successfully');
  }

  function deleteCase(){
    if(!selected.value||!confirm('Are you sure you want to delete this case?'))return;
    const idx=testCases.value.findIndex(t=>t.test_id===selected.value.test_id);
    if(idx>=0)testCases.value.splice(idx,1);
    selected.value=null;
    showToast('Deleted successfully');
  }

  function newCase(){
    const seq = Date.now().toString(36).slice(-5).toUpperCase();
    const id = `TC_NEW_${seq}`;
    const tc = {
      test_id:id, category:'HappyPath', description:'',
      context:{language:'English',simulated_asr_confidence:0.95},
      conversation:[{role:'user',content:''}],
      expected_behavior:{action:'call_tool:transfer_call',parameters:{language:'English',branch_id:'0',intent_id:'0'}},
      eval_metrics:{must_trigger_action:'call_tool:transfer_call',exact_match_params:['language','branch_id','intent_id']}
    };
    testCases.value.push(tc);
    selected.value=tc;
    showToast('New case created');
  }

  function parseImportedCases(rawText){
    const text = String(rawText||'').trim();
    if(!text) return [];
    try{
      const parsed = JSON.parse(text);
      if(Array.isArray(parsed)) return parsed;
      if(parsed && typeof parsed === 'object') return [parsed];
      throw new Error('JSON content must be an object or array');
    }catch(_jsonErr){
      const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      if(!lines.length) return [];
      try{
        return lines.map(l=>JSON.parse(l));
      }catch(jsonlErr){
        throw new Error('File is not valid JSON or JSONL: '+jsonlErr.message);
      }
    }
  }

  function importFile(e){
    const file = e.target.files[0];
    if(!file)return;
    const prevSelectedId = selected.value?.test_id;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const cases = parseImportedCases(ev.target.result);
        // Clear stale translations to prevent cross-contamination
        Object.keys(translations).forEach(k => delete translations[k]);
        localStorage.removeItem('ivr_translations');
        testCases.value = cases;
        if(!cases.length){
          selected.value = null;
        }else{
          selected.value = cases.find(tc=>tc.test_id===prevSelectedId) || cases[0];
        }
        showToast(`Imported ${cases.length} cases (translations cleared)`);
      }catch(err){showToast('Import failed: '+err.message,'err')}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function exportJsonl(){
    const content = testCases.value.map(tc=>JSON.stringify(tc)).join('\n');
    downloadFile(content,'agent_regression_tests.jsonl','application/json');
    showToast(`Exported ${testCases.value.length} cases`);
  }

  async function exportJson(){
    const content = JSON.stringify(testCases.value, null, 2);
    try {
      if (window.showSaveFilePicker) {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'agent_regression_tests.json',
          types: [{ description: 'JSON 文件', accept: {'application/json': ['.json']} }]
        });
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
        showToast('JSON successfully exported to specified folder');
      } else {
        downloadFile(content,'agent_regression_tests.json','application/json');
        showToast(`Exported ${testCases.value.length} cases (JSON)`);
      }
    } catch(err) {
      if(err.name !== 'AbortError') showToast('Failed to export JSON: ' + err.message, 'err');
    }
  }

  function exportMarkdown(){
    const grouped = {};
    testCases.value.forEach(tc=>{
      if(!grouped[tc.category])grouped[tc.category]=[];
      grouped[tc.category].push(tc);
    });
    let md = '# Riyadh Bank IVR 测试用例集\n\n';
    md += `> Total ${testCases.value.length} cases, Generated at: ${new Date().toLocaleString()}\n\n---\n\n`;
    for(const [cat,cases] of Object.entries(grouped)){
      md += `## ${cat}\n\n`;
      for(const tc of cases){
        const p = tc.expected_behavior?.parameters||{};
        const bInfo = BRANCHES[p.branch_id];
        const bLabel = bInfo ? `${p.branch_id} (${bInfo.en} / ${bInfo.ar})` : (p.branch_id||'N/A');
        const iLabel = INTENTS[p.intent_id] || p.intent_id || 'N/A';
        md += `### ${tc.test_id} — ${tc.description||''}\n\n`;
        if(tc.expected_behavior?.action==='call_tool:transfer_call'){
          md += `**Language**: ${p.language||'?'} | **Branch**: ${bLabel} | **Intent**: ${p.intent_id} (${iLabel})\n\n`;
        }
        for(const msg of tc.conversation){
          const icon = msg.role==='user'?'👤 Customer':'🤖 Agent';
          md += `> ${icon}: ${msg.content}\n`;
          const key = msgKey(tc, tc.conversation.indexOf(msg));
          const zh = translations[key];
          if(zh) md += `> (Translation: ${zh})\n`;
          md += `\n`;
        }
        if(tc.expected_behavior?.action==='call_tool:transfer_call'){
          md += `✅ Expected: \`transfer_call(language="${p.language}", branch_id="${p.branch_id}", intent_id="${p.intent_id}")\`\n\n`;
        } else {
          md += `📋 Expected: \`${tc.expected_behavior?.action||'?'}\`\n\n`;
        }
        md += '---\n\n';
      }
    }
    downloadFile(md,'test_scripts.md','text/markdown');
    showToast('Markdown exported successfully');
  }

  function downloadFile(content,name,type){
    const blob = new Blob([content],{type:type+';charset=utf-8'});
    const a = document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=name;a.click();
    URL.revokeObjectURL(a.href);
  }

  function saveSettings(){
    localStorage.setItem('ivr_annotation_settings',JSON.stringify(settings));
    showSettings.value=false;
    showToast('Settings saved');
  }

  return {
    isAuthenticated,passwordInput,passwordError,login,
    testCases,selected,searchQ,filterCat,filterLang,branchSearch,branchDropOpen,listRef,
    showSettings,showCoverage,toast,settings,translations,translating,regenerating,
    selectedParams,filteredCases,filteredBranches,coveredBranches,
    BRANCHES,INTENTS,CATEGORIES,
    catClass,branchLabel,isArabic,catCount,intentCount,langCount,caseLanguage,
    selectCase,scrollToItem,pickBranch,getTranslation,setTranslation,
    translateMsg,regenerateMsg,translateAll,addMsg,removeMsg,
    saveCase,deleteCase,newCase,importFile,exportJsonl,exportJson,exportMarkdown,saveSettings,showToast
  };
}
}).mount('#app');
</script>
</body>
</html>
